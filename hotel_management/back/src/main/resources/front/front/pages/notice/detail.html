<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>公告详情</title>
  <link rel="stylesheet" href="../../css/portal.css">
</head>
<body>
  <div class="portal-shell">
    <div data-portal-header></div>
    <main class="portal-page">
      <div class="portal-container">
        <div id="detailHost"></div>
      </div>
    </main>
  </div>

  <script src="../../js/portal.js"></script>
  <script>
    hotelPortal.mountTopbar({ current: 'notice', subtitle: '公告详情' });

    const noticeId = hotelPortal.query('id');
    const detailHost = document.getElementById('detailHost');

    async function bootstrap() {
      if (!noticeId) {
        detailHost.innerHTML = hotelPortal.emptyState('缺少公告编号');
        return;
      }
      try {
        const result = await hotelPortal.api(`notice/detail/${noticeId}`, { method: 'GET' });
        const notice = result.data;
        detailHost.innerHTML = `
          <section class="portal-section-head">
            <h2>${hotelPortal.escapeHtml(notice.title || '公告详情')}</h2>
            <span>${hotelPortal.formatDate(notice.addtime)}</span>
          </section>
          <section class="portal-card">
            ${notice.picture ? `<img class="portal-detail-cover" src="${hotelPortal.assetUrl(notice.picture)}" alt="${hotelPortal.escapeHtml(notice.title || '公告图片')}">` : ''}
            <div class="portal-info-list" style="margin-top:16px;">
              <div class="portal-info-row"><span>简介</span><span>${hotelPortal.escapeHtml(hotelPortal.stripHtml(notice.introduction) || '-')}</span></div>
              <div class="portal-info-row"><span>正文</span><span>${hotelPortal.escapeHtml(hotelPortal.stripHtml(notice.content) || '-')}</span></div>
            </div>
            <div class="portal-form-actions" style="margin-top:16px;">
              <a class="portal-button-secondary" href="./list.html">返回公告列表</a>
            </div>
          </section>
        `;
      } catch (error) {
        detailHost.innerHTML = hotelPortal.emptyState('公告详情加载失败');
      }
    }

    bootstrap();
  </script>
</body>
</html>
