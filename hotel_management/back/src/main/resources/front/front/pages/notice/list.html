<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>酒店公告</title>
  <link rel="stylesheet" href="../../css/portal.css">
</head>
<body>
  <div class="portal-shell">
    <div data-portal-header></div>
    <main class="portal-page">
      <div class="portal-container">
        <div class="portal-section-head">
          <h2>酒店公告</h2>
          <span>查看最新通知、营业信息和服务说明</span>
        </div>
        <div id="noticeHost" class="portal-news-grid"></div>
      </div>
    </main>
  </div>

  <script src="../../js/portal.js"></script>
  <script>
    hotelPortal.mountTopbar({ current: 'notice', subtitle: '酒店公告与通知' });

    async function loadNotices() {
      const host = document.getElementById('noticeHost');
      try {
        const result = await hotelPortal.api('notice/list', {
          method: 'GET',
          params: { page: 1, limit: 20, sort: 'addtime', order: 'desc' }
        });
        const rows = result.data.list || [];
        if (!rows.length) {
          host.innerHTML = hotelPortal.emptyState('暂无公告');
          return;
        }
        host.innerHTML = rows.map(function (item) {
          return `
            <article class="portal-panel portal-news-card">
              <div class="portal-news-body">
                <div class="portal-tags">
                  <span class="portal-tag">${hotelPortal.formatDate(item.addtime)}</span>
                </div>
                <h3>${hotelPortal.escapeHtml(item.title)}</h3>
                <p>${hotelPortal.escapeHtml(hotelPortal.stripHtml(item.introduction || item.content).slice(0, 120) || '查看公告详情。')}</p>
                <div class="portal-form-actions" style="margin-top:16px;">
                  <a class="portal-button-secondary" href="./detail.html?id=${item.id}">查看详情</a>
                </div>
              </div>
            </article>
          `;
        }).join('');
      } catch (error) {
        host.innerHTML = hotelPortal.emptyState('公告加载失败');
      }
    }

    loadNotices();
  </script>
</body>
</html>
