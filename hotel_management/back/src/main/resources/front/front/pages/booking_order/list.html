<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>我的订单</title>
  <link rel="stylesheet" href="../../css/portal.css">
</head>
<body>
  <div class="portal-shell">
    <div data-portal-header></div>
    <main class="portal-page">
      <div class="portal-container">
        <div class="portal-section-head">
          <h2>我的订单</h2>
          <span>查看预订、支付、入住和离店状态</span>
        </div>

        <section id="summaryHost" class="portal-split" style="margin-bottom:18px;"></section>

        <section class="portal-panel">
          <div class="portal-list-toolbar">
            <div class="portal-field">
              <label for="statusFilter">订单状态</label>
              <select class="portal-select" id="statusFilter">
                <option value="">全部订单状态</option>
                <option value="created">预订中</option>
                <option value="checked_in">入住中</option>
                <option value="completed">已离店</option>
                <option value="cancelled">已取消</option>
              </select>
            </div>
            <div class="portal-field">
              <label for="payFilter">支付状态</label>
              <select class="portal-select" id="payFilter">
                <option value="">全部支付状态</option>
                <option value="unpaid">未支付</option>
                <option value="partial">部分支付</option>
                <option value="paid">已支付</option>
              </select>
            </div>
            <div class="portal-form-actions">
              <button class="portal-button" type="button" id="filterButton">筛选</button>
              <a class="portal-button-secondary" href="../room_catalog/list.html">继续看房</a>
            </div>
          </div>
        </section>

        <section class="portal-section">
          <div id="orderHost" class="portal-order-grid"></div>
        </section>
      </div>
    </main>
  </div>

  <script src="../../js/portal.js"></script>
  <script>
    hotelPortal.mountTopbar({ current: 'orders', subtitle: '客户订单中心' })
    hotelPortal.ensureLogin('pages/booking_order/list.html')

    const state = { rows: [], filtered: [] }

    function currentStage(row) {
      if (row.booking_status === 'cancelled') return '已取消'
      if (row.booking_status === 'completed') return '已离店'
      if (row.booking_status === 'checked_in') return '入住中'
      if (row.ispay === 'paid' || row.ispay === 'partial') return '待入住'
      return '预订中'
    }

    function renderSummary() {
      const total = state.rows.length
      const unpaid = state.rows.filter(item => item.ispay === 'unpaid').length
      const active = state.rows.filter(item => item.booking_status === 'created' || item.booking_status === 'checked_in').length
      const finished = state.rows.filter(item => item.booking_status === 'completed').length
      document.getElementById('summaryHost').innerHTML = `
        <div class="portal-card"><span class="portal-muted">订单总数</span><div class="portal-price" style="font-size:26px;">${total}</div></div>
        <div class="portal-card"><span class="portal-muted">待支付</span><div class="portal-price" style="font-size:26px;">${unpaid}</div></div>
        <div class="portal-card"><span class="portal-muted">进行中订单</span><div class="portal-price" style="font-size:26px;">${active}</div></div>
        <div class="portal-card"><span class="portal-muted">已完成</span><div class="portal-price" style="font-size:26px;">${finished}</div></div>
      `
    }

    function renderOrders() {
      const host = document.getElementById('orderHost')
      if (!state.filtered.length) {
        host.innerHTML = hotelPortal.emptyState('暂无订单记录', '<a class="portal-button-secondary" href="../room_catalog/list.html">去浏览房源</a>')
        return
      }
      host.innerHTML = state.filtered.map(function (row) {
        const canPay = row.ispay !== 'paid' && row.booking_status !== 'cancelled' && row.booking_status !== 'completed'
        return `
          <article class="portal-panel portal-order-card">
            <div class="portal-order-body">
              <h3>${hotelPortal.escapeHtml(row.kefangmingcheng || '客房订单')}</h3>
              <div class="portal-tags">
                <span class="portal-tag">${hotelPortal.escapeHtml(row.yudingbianhao || '订单')}</span>
                <span class="portal-tag">${hotelPortal.escapeHtml(row.room_category || '未分类')}</span>
                <span class="portal-status ${row.ispay === 'paid' ? 'success' : row.ispay === 'partial' ? 'info' : 'warn'}">${hotelPortal.payStatusLabel(row.ispay)}</span>
                <span class="portal-status info">${currentStage(row)}</span>
              </div>
              <div class="portal-info-list">
                <div class="portal-info-row"><span>订单金额</span><span>${hotelPortal.formatMoney(row.zongjine)}</span></div>
                <div class="portal-info-row"><span>入住时间</span><span>${hotelPortal.formatDate(row.expected_checkin_date)}</span></div>
                <div class="portal-info-row"><span>离店时间</span><span>${hotelPortal.formatDate(row.expected_checkout_date)}</span></div>
                <div class="portal-info-row"><span>订单追踪</span><span>${hotelPortal.orderTrackingLabel(row)}</span></div>
              </div>
              <div class="portal-form-actions" style="margin-top:16px;">
                <a class="portal-button-secondary" href="./detail.html?id=${row.id}">查看详情与入住人</a>
                ${canPay ? `<a class="portal-button" href="./detail.html?id=${row.id}">继续支付</a>` : ''}
              </div>
            </div>
          </article>
        `
      }).join('')
    }

    function applyFilters() {
      const status = document.getElementById('statusFilter').value
      const pay = document.getElementById('payFilter').value
      state.filtered = state.rows.filter(function (row) {
        const matchStatus = !status || row.booking_status === status
        const matchPay = !pay || row.ispay === pay
        return matchStatus && matchPay
      })
      renderOrders()
    }

    async function loadOrders() {
      try {
        const result = await hotelPortal.api('booking_order/page', {
          method: 'GET',
          params: { page: 1, limit: 100, sort: 'addtime', order: 'desc' }
        })
        state.rows = result.data.list || []
        state.filtered = state.rows.slice()
        renderSummary()
        renderOrders()
      } catch (error) {
        document.getElementById('orderHost').innerHTML = hotelPortal.emptyState('订单加载失败')
        hotelPortal.toast(error.message || '订单加载失败', 'error')
      }
    }

    document.getElementById('filterButton').addEventListener('click', applyFilters)
    loadOrders()
  </script>
</body>
</html>
