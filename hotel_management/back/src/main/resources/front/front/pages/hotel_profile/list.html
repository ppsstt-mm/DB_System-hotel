<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>酒店信息</title>
  <link rel="stylesheet" href="../../css/portal.css">
</head>
<body>
  <div class="portal-shell">
    <div data-portal-header></div>
    <main class="portal-page">
      <div class="portal-container">
        <div id="hotelHost"></div>
      </div>
    </main>
  </div>

  <script src="../../js/portal.js"></script>
  <script>
    hotelPortal.mountTopbar({ current: 'hotel', subtitle: '查看酒店基础信息与服务评价' });

    let hotel = null;
    let reviews = [];
    let favorite = { favorited: false, favoriteId: null };

    async function submitReview() {
      if (!hotelPortal.ensureLogin('pages/hotel_profile/list.html')) {
        return;
      }
      const content = document.getElementById('reviewContent').value.trim();
      const score = Number(document.getElementById('reviewScore').value || 5);
      if (!content) {
        hotelPortal.toast('请填写评价内容', 'error');
        return;
      }
      try {
        await hotelPortal.api('hotel_review/add', {
          method: 'POST',
          json: {
            refid: hotel.id,
            content: content,
            score: score
          }
        });
        document.getElementById('reviewContent').value = '';
        document.getElementById('reviewScore').value = '5';
        hotelPortal.toast('评价已提交', 'success');
        await loadReviews();
        renderHotel();
      } catch (error) {
        hotelPortal.toast(error.message || '评价提交失败', 'error');
      }
    }

    async function loadFavoriteStatus() {
      if (!hotelPortal.isLoggedIn() || !hotel || !hotel.id) {
        favorite = { favorited: false, favoriteId: null };
        return;
      }
      try {
        const result = await hotelPortal.api('favorite/status', {
          method: 'GET',
          params: {
            tablename: 'hotel_profile',
            refid: hotel.id
          }
        });
        favorite = result.data || { favorited: false, favoriteId: null };
      } catch (error) {
        favorite = { favorited: false, favoriteId: null };
      }
    }

    async function toggleFavorite() {
      if (!hotelPortal.ensureLogin('pages/hotel_profile/list.html')) {
        return;
      }
      try {
        const result = await hotelPortal.api('favorite/toggle', {
          method: 'POST',
          json: {
            tablename: 'hotel_profile',
            refid: hotel.id,
            name: hotel.jiudianmingcheng,
            picture: hotel.jiudiantupian,
            type: '酒店收藏',
            inteltype: hotel.xingji || hotel.leibie || ''
          }
        });
        favorite = result.data || { favorited: false, favoriteId: null };
        hotelPortal.toast(favorite.favorited ? '已加入收藏' : '已取消收藏', 'success');
        renderHotel();
      } catch (error) {
        hotelPortal.toast(error.message || '收藏操作失败', 'error');
      }
    }

    function renderReviewFeed() {
      if (!reviews.length) {
        return hotelPortal.emptyState('暂无酒店服务评价');
      }
      return reviews.map(function (review) {
        return `
          <article class="portal-panel portal-review-item">
            <div class="portal-review-head">
              ${hotelPortal.avatarMarkup(review.nickname || '住客')}
              <div style="flex:1;">
                <div class="portal-review-meta">
                  <strong>${hotelPortal.escapeHtml(review.nickname || '住客')}</strong>
                  <span class="portal-tag">${hotelPortal.formatDate(review.addtime)}</span>
                  ${review.score ? `<span class="portal-rating">${hotelPortal.scoreStars(review.score)}</span>` : ''}
                </div>
              </div>
            </div>
            <div class="portal-review-body">${hotelPortal.escapeHtml(hotelPortal.stripHtml(review.content) || '暂无评价内容')}</div>
            ${review.reply ? `<div class="portal-review-reply"><strong>酒店回复</strong><div>${hotelPortal.escapeHtml(hotelPortal.stripHtml(review.reply))}</div></div>` : ''}
          </article>
        `;
      }).join('');
    }

    function renderHotel() {
      const host = document.getElementById('hotelHost');
      if (!hotel) {
        host.innerHTML = hotelPortal.emptyState('暂无酒店信息');
        return;
      }
      const intro = hotelPortal.stripHtml(hotel.jiudianjieshao) || '暂无酒店介绍';
      host.innerHTML = `
        <section class="portal-section-head">
          <h2>${hotelPortal.escapeHtml(hotel.jiudianmingcheng)}</h2>
          <span>${hotelPortal.escapeHtml(hotel.leibie || '酒店')} · ${hotelPortal.escapeHtml(hotel.xingji || '服务信息')}</span>
        </section>

        <section class="portal-detail-layout">
          <div class="portal-detail-main">
            <img class="portal-detail-cover" src="${hotelPortal.assetUrl(hotel.jiudiantupian)}" alt="${hotelPortal.escapeHtml(hotel.jiudianmingcheng)}">
            <div class="portal-card" style="margin-top:16px;">
              <h3>酒店信息</h3>
              <div class="portal-info-list">
                <div class="portal-info-row"><span>酒店名称</span><span>${hotelPortal.escapeHtml(hotel.jiudianmingcheng || '-')}</span></div>
                <div class="portal-info-row"><span>类别</span><span>${hotelPortal.escapeHtml(hotel.leibie || '-')}</span></div>
                <div class="portal-info-row"><span>星级</span><span>${hotelPortal.escapeHtml(hotel.xingji || '-')}</span></div>
                <div class="portal-info-row"><span>服务热线</span><span>${hotelPortal.escapeHtml(hotel.fuwurexian || '-')}</span></div>
                <div class="portal-info-row"><span>酒店地址</span><span>${hotelPortal.escapeHtml(hotel.jiudiandizhi || '-')}</span></div>
                <div class="portal-info-row"><span>酒店介绍</span><span>${hotelPortal.escapeHtml(intro)}</span></div>
              </div>
            </div>
          </div>

          <aside class="portal-detail-sidebar">
            <div class="portal-stack">
              <div class="portal-card">
                <h3>浏览房源</h3>
                <p class="portal-muted">查看可预订房源、房型详情和住客评价。</p>
                <div class="portal-form-actions" style="margin-top:16px;">
                  <a class="portal-button" href="../room_catalog/list.html">查看房源</a>
                  <button class="portal-button-secondary" type="button" id="favoriteButton">${favorite.favorited ? '取消收藏' : '加入收藏'}</button>
                </div>
              </div>
              <div class="portal-card">
                <h3>发表服务评价</h3>
                <div class="portal-inline-form">
                  <div class="portal-field">
                    <label for="reviewScore">评分</label>
                    <select class="portal-select" id="reviewScore">
                      <option value="5">5 分</option>
                      <option value="4">4 分</option>
                      <option value="3">3 分</option>
                      <option value="2">2 分</option>
                      <option value="1">1 分</option>
                    </select>
                  </div>
                  <div class="portal-field">
                    <label for="reviewContent">评价内容</label>
                    <textarea class="portal-textarea" id="reviewContent" placeholder="说说你对酒店服务、环境和接待体验的感受"></textarea>
                  </div>
                </div>
                <div class="portal-form-actions" style="margin-top:16px;">
                  <button class="portal-button" type="button" id="reviewButton">提交评价</button>
                </div>
              </div>
            </div>
          </aside>
        </section>

        <section class="portal-section">
          <div class="portal-section-head">
            <h2>服务评价</h2>
            <span>查看住客对酒店服务的反馈与酒店回复</span>
          </div>
          <div class="portal-review-feed">${renderReviewFeed()}</div>
        </section>
      `;
      document.getElementById('reviewButton').addEventListener('click', submitReview);
      document.getElementById('favoriteButton').addEventListener('click', toggleFavorite);
    }

    async function loadReviews() {
      const result = await hotelPortal.api('hotel_review/list', {
        method: 'GET',
        params: { page: 1, limit: 20, sort: 'addtime', order: 'desc' }
      });
      reviews = result.data.list || [];
    }

    async function bootstrap() {
      try {
        const hotelRes = await hotelPortal.api('hotel_profile/list', {
          method: 'GET',
          params: { page: 1, limit: 1 }
        });
        hotel = (hotelRes.data.list || [])[0] || null;
        await loadReviews();
        await loadFavoriteStatus();
        renderHotel();
      } catch (error) {
        document.getElementById('hotelHost').innerHTML = hotelPortal.emptyState('酒店信息加载失败');
        hotelPortal.toast(error.message || '酒店信息加载失败', 'error');
      }
    }

    bootstrap();
  </script>
</body>
</html>
